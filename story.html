<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story — Shin Haeya & Yoon Juyeon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+KR:wght@200;300;400&family=Noto+Sans+KR:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rose: #c4567a;
    --rose-light: #e8a0b8;
    --rose-pale: #f9eef3;
    --navy: #2b3f5c;
    --gold: #b8966a;
    --gold-light: #d4b896;
    --cream: #fdf8f4;
    --ink: #2a2228;
    --muted: #7a6e74;
    --fog: #f0eaed;
  }
  html { scroll-behavior: smooth; }
  body {
    background: #1a1520;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
  }
  .page-frame {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: var(--cream);
    position: relative;
    overflow-x: hidden;
  }
  .story-hero {
    min-height: 280px;
    padding: 36px 24px 32px;
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, rgba(196,86,122,0.22) 0%, transparent 65%),
      radial-gradient(ellipse 70% 70% at 90% 90%, rgba(43,63,92,0.35) 0%, transparent 65%),
      linear-gradient(175deg, #0d0a12 0%, #160f1e 54%, #0a0e18 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 24px;
  }
  .top-link {
    color: rgba(255,255,255,0.62);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 1px;
    width: fit-content;
    transition: color 0.2s;
  }
  .top-link:hover { color: rgba(255,255,255,0.9); }
  .story-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .story-title {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-style: italic;
    font-weight: 400;
    line-height: 1.15;
  }
  .story-subtitle {
    margin-top: 14px;
    font-family: 'Noto Serif KR', serif;
    font-size: 12.5px;
    font-weight: 300;
    line-height: 1.9;
    color: rgba(255,255,255,0.6);
  }
  .desktop-content { background: var(--cream); }
  .main-section { padding: 30px 22px 20px; }
  .section-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 20px;
  }
  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .hint {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--muted);
  }
  .story-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .story-card {
    border: 0;
    width: 100%;
    text-align: left;
    display: grid;
    grid-template-columns: 104px 1fr;
    gap: 14px;
    padding: 12px;
    background: white;
    border-radius: 18px;
    border: 0.5px solid rgba(184,150,106,0.22);
    box-shadow: 0 8px 30px rgba(43,35,48,0.045);
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.16s ease, box-shadow 0.16s ease;
  }
  .story-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 36px rgba(43,35,48,0.08);
  }
  .story-thumb {
    width: 104px;
    height: 128px;
    border-radius: 13px;
    overflow: hidden;
    background:
      radial-gradient(circle at 30% 20%, rgba(232,160,184,0.7), transparent 45%),
      linear-gradient(145deg, #f7e7ee, #e9d6ca);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(122,110,116,0.55);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 2px;
    flex-shrink: 0;
  }
  .story-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .story-card-body { min-width: 0; padding: 4px 4px 4px 0; }
  .story-card h3 {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 7px;
    line-height: 1.5;
  }
  .story-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .story-excerpt {
    font-family: 'Noto Serif KR', serif;
    font-size: 12.5px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .story-actions {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .empty {
    text-align: center;
    padding: 36px 18px;
    color: var(--muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    line-height: 1.9;
    background: white;
    border-radius: 16px;
    border: 0.5px solid rgba(184,150,106,0.18);
  }
  .editor-section { padding: 0 22px 30px; }
  .panel {
    background: white;
    border: 0.5px solid rgba(196,86,122,0.2);
    border-radius: 18px;
    padding: 22px 18px;
    box-shadow: 0 8px 30px rgba(43,35,48,0.06);
  }
  input, textarea {
    width: 100%;
    border: 0.5px solid rgba(196,86,122,0.25);
    background: #fffdfb;
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    margin-bottom: 10px;
  }
  input:focus, textarea:focus, .rich-editor:focus {
    border-color: rgba(196,86,122,0.7);
    box-shadow: 0 0 0 3px rgba(196,86,122,0.08);
  }
  .field-label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--gold);
    text-transform: uppercase;
    margin: 12px 0 7px;
  }
  .upload-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .file-input {
    font-size: 12px;
    padding: 10px 12px;
  }
  .thumbnail-preview {
    min-height: 92px;
    border: 0.5px dashed rgba(196,86,122,0.3);
    border-radius: 14px;
    background: var(--rose-pale);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(122,110,116,0.56);
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
  }
  .thumbnail-preview img {
    width: 100%;
    max-height: 170px;
    object-fit: cover;
    display: block;
  }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px;
    border: 0.5px solid rgba(196,86,122,0.22);
    border-bottom: 0;
    border-radius: 14px 14px 0 0;
    background: #fff8fa;
  }
  .tool-btn, .color-dot {
    min-width: 34px;
    height: 32px;
    padding: 0 9px;
    border-radius: 10px;
    border: 0.5px solid rgba(196,86,122,0.16);
    background: white;
    color: var(--ink);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tool-btn b { font-weight: 700; }
  .tool-btn i { font-family: serif; }
  .color-dot {
    width: 32px;
    min-width: 32px;
    padding: 0;
    border-radius: 50%;
  }
  .rich-editor {
    width: 100%;
    min-height: 230px;
    border: 0.5px solid rgba(196,86,122,0.22);
    background: #fffdfb;
    border-radius: 0 0 14px 14px;
    padding: 16px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    line-height: 2;
    color: var(--ink);
    outline: none;
    overflow-wrap: break-word;
  }
  .rich-editor:empty::before {
    content: attr(data-placeholder);
    color: rgba(122,110,116,0.45);
  }
  .rich-editor img {
    max-width: 100%;
    border-radius: 14px;
    display: block;
    margin: 14px auto;
  }
  .button-row { display: flex; gap: 9px; flex-wrap: wrap; }
  button, .admin-toggle {
    border: none;
    border-radius: 999px;
    padding: 11px 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.18s, transform 0.12s;
  }
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  .primary { background: var(--rose); color: white; }
  .secondary { background: var(--rose-pale); color: var(--rose); }
  .dark { background: #0d0a12; color: rgba(255,255,255,0.82); }
  .admin-toggle {
    background: rgba(196,86,122,0.08);
    color: var(--rose);
    border: 0.5px solid rgba(196,86,122,0.22);
    white-space: nowrap;
    padding: 9px 14px;
    font-size: 11px;
    flex-shrink: 0;
  }
  .admin-toggle:hover { background: rgba(196,86,122,0.14); opacity: 1; }
  .hidden { display: none !important; }
  .status {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    margin-top: 10px;
    min-height: 18px;
  }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(13,10,18,0.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .modal-card {
    width: min(100%, 300px);
    background: var(--cream);
    border: 0.5px solid rgba(212,184,150,0.4);
    border-radius: 20px;
    padding: 22px 20px 18px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.3);
    position: relative;
    animation: modalIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    padding: 0;
    background: rgba(196,86,122,0.08);
    color: var(--rose);
    font-size: 16px;
    border-radius: 999px;
  }
  .modal-card .section-label { font-size: 9px; letter-spacing: 3px; margin-bottom: 4px; }
  .modal-card .section-title { font-size: 19px; margin-bottom: 4px; margin-right: 30px; }
  .modal-card .hint { font-size: 11px; line-height: 1.6; margin-bottom: 14px; }
  .modal-card input { padding: 10px 12px; font-size: 13px; border-radius: 10px; margin-bottom: 8px; }
  .modal-card button.primary { width: 100%; padding: 11px 14px; font-size: 13px; border-radius: 10px; }
  .modal-card .status { font-size: 11px; margin-top: 6px; }
  .detail-view {
    position: fixed;
    inset: 0;
    z-index: 80;
    background: var(--cream);
    overflow-y: auto;
    display: none;
  }
  .detail-view.open { display: block; }
  .detail-shell {
    max-width: 820px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--cream);
  }
  .detail-hero {
    position: relative;
    min-height: 260px;
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, rgba(196,86,122,0.22) 0%, transparent 65%),
      linear-gradient(175deg, #0d0a12 0%, #160f1e 54%, #0a0e18 100%);
    color: #fff;
    padding: 26px 24px 34px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }
  .detail-hero.has-image {
    min-height: 360px;
    background-size: cover;
    background-position: center;
  }
  .detail-hero.has-image::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(13,10,18,0.15), rgba(13,10,18,0.82));
  }
  .detail-hero > * { position: relative; z-index: 1; }
  .detail-back {
    position: absolute;
    top: 22px;
    left: 22px;
    z-index: 2;
    background: rgba(255,255,255,0.14);
    color: white;
    border: 0.5px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
  }
  .detail-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 25px;
    font-weight: 400;
    line-height: 1.45;
    margin-bottom: 10px;
  }
  .detail-date {
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 3px;
    color: var(--gold-light);
    font-size: 13px;
  }
  .detail-content {
    padding: 34px 24px 64px;
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    line-height: 2.05;
    color: var(--ink);
  }
  .detail-content img {
    max-width: 100%;
    border-radius: 16px;
    margin: 18px auto;
    display: block;
  }
  .detail-content p { margin-bottom: 16px; }
  .footer {
    background: #0d0a12;
    padding: 28px 24px;
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 3px;
  }
  body.modal-open { overflow: hidden; }
  @media (min-width: 900px) {
    body { padding: 40px; align-items: flex-start; }
    .page-frame {
      max-width: 1160px;
      width: 100%;
      min-height: calc(100vh - 80px);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.4);
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: 1fr auto;
      grid-template-areas:
        "hero content"
        "foot foot";
    }
    .story-hero {
      grid-area: hero;
      min-height: 100%;
      padding: 52px 44px;
      position: sticky;
      top: 0;
      height: calc(100vh - 80px);
      justify-content: flex-end;
      gap: 0;
    }
    .story-hero .top-link { margin-bottom: auto; }
    .story-title { font-size: 52px; }
    .story-subtitle { font-size: 13.5px; margin-top: 18px; }
    .desktop-content {
      grid-area: content;
      overflow-y: auto;
      max-height: calc(100vh - 80px);
    }
    .main-section { padding: 48px 56px 32px; }
    .editor-section { padding: 0 56px 48px; }
    .story-list { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .story-card { grid-template-columns: 120px 1fr; }
    .story-thumb { width: 120px; height: 150px; }
    .panel { max-width: 680px; }
    .footer { grid-area: foot; padding: 22px 40px; }
    .detail-view { background: rgba(13,10,18,0.88); padding: 40px; }
    .detail-shell {
      border-radius: 28px;
      overflow: hidden;
      min-height: auto;
      box-shadow: 0 40px 100px rgba(0,0,0,0.35);
    }
    .detail-content { padding: 46px 58px 70px; }
  }
</style>
</head>
<body>
<div class="page-frame">
  <header class="story-hero">
    <a class="top-link" href="index.html">← Wedding Invitation</a>
    <div>
      <div class="story-label">Story Archive</div>
      <h1 class="story-title">Shin Haeya<br><span style="color:var(--rose-light);">& Yoon Juyeon</span></h1>
      <p class="story-subtitle">둘의 이야기를 조용히 남겨두는 페이지입니다.<br>글을 누르면 전체 이야기가 열립니다.</p>
    </div>
  </header>

  <div class="desktop-content">
    <main class="main-section">
      <div class="section-head">
        <div>
          <span class="section-label">Archive</span>
          <h2 class="section-title">Story Backup</h2>
          <p class="hint">썸네일을 누르면 전체 글 페이지로 이동합니다.</p>
        </div>
        <button class="admin-toggle" id="adminToggle" type="button">관리자 글쓰기</button>
      </div>
      <div class="story-list" id="storyList">
        <div class="empty">글을 불러오는 중입니다.</div>
      </div>
    </main>

    <section class="editor-section hidden" id="editorPanel">
      <div class="panel">
        <span class="section-label">Write Story</span>
        <h2 class="section-title" id="editorTitle">새 글 작성</h2>
        <input id="storyTitle" type="text" placeholder="제목">

        <label class="field-label" for="thumbnailFile">Thumbnail</label>
        <div class="upload-row">
          <input class="file-input" id="thumbnailFile" type="file" accept="image/*">
          <div class="thumbnail-preview" id="thumbnailPreview">썸네일 미리보기</div>
        </div>

        <label class="field-label">Content Editor</label>
        <div class="toolbar" aria-label="글 꾸미기 도구">
          <button class="tool-btn" type="button" data-command="bold"><b>B</b></button>
          <button class="tool-btn" type="button" data-command="italic"><i>I</i></button>
          <button class="tool-btn" type="button" data-command="underline"><u>U</u></button>
          <button class="tool-btn" type="button" data-command="justifyLeft">왼쪽</button>
          <button class="tool-btn" type="button" data-command="justifyCenter">가운데</button>
          <button class="tool-btn" type="button" data-command="insertUnorderedList">목록</button>
          <button class="color-dot" type="button" data-color="#2a2228" style="background:#2a2228;" aria-label="검정"></button>
          <button class="color-dot" type="button" data-color="#c4567a" style="background:#c4567a;" aria-label="분홍"></button>
          <button class="color-dot" type="button" data-color="#b8966a" style="background:#b8966a;" aria-label="금색"></button>
          <button class="color-dot" type="button" data-color="#2b3f5c" style="background:#2b3f5c;" aria-label="남색"></button>
          <button class="tool-btn" type="button" id="insertImageBtn">사진 추가</button>
        </div>
        <div id="richEditor" class="rich-editor" contenteditable="true" data-placeholder="여기에 이야기를 적어주세요."></div>
        <input class="hidden" id="contentImageFile" type="file" accept="image/*">

        <div class="button-row" style="margin-top:14px;">
          <button class="primary" id="saveBtn" type="button">저장하기</button>
          <button class="secondary hidden" id="cancelEditBtn" type="button">수정 취소</button>
          <button class="dark" id="logoutBtn" type="button">로그아웃</button>
        </div>
        <div class="status" id="saveStatus"></div>
      </div>
    </section>
  </div>

  <footer class="footer">With Love · Story Archive</footer>
</div>

<div class="modal-backdrop hidden" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
  <div class="modal-card">
    <button class="modal-close" id="closeLoginBtn" type="button" aria-label="닫기">×</button>
    <span class="section-label">Admin Login</span>
    <h2 class="section-title" id="loginTitle">글쓰기 로그인</h2>
    <p class="hint">정해둔 아이디와 비밀번호로만 글을 쓸 수 있습니다.</p>
    <input id="loginId" type="text" placeholder="아이디" autocomplete="username">
    <input id="password" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button class="primary" id="loginBtn" type="button">로그인</button>
    <div class="status" id="authStatus"></div>
  </div>
</div>

<article class="detail-view" id="detailView" aria-hidden="true">
  <div class="detail-shell">
    <section class="detail-hero" id="detailHero">
      <button class="detail-back" id="closeDetailBtn" type="button">← 목록으로</button>
      <h1 class="detail-title" id="detailTitle"></h1>
      <div class="detail-date" id="detailDate"></div>
    </section>
    <section class="detail-content" id="detailContent"></section>
  </div>
</article>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  const ADMIN_EMAIL = window.STORY_ADMIN_EMAIL;
  const ADMIN_ID = window.STORY_ADMIN_ID || 'admin';
  const IMAGE_BUCKET = 'story-images';

  const $ = (id) => document.getElementById(id);
  let currentUser = null;
  let editingId = null;
  let cachedStories = [];
  let currentThumbnailUrl = '';

  function setStatus(target, message) { $(target).textContent = message || ''; }

  function escapeHtml(value) {
    return String(value || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function stripHtml(html) {
    const div = document.createElement('div');
    div.innerHTML = html || '';
    return (div.textContent || div.innerText || '').trim();
  }

  function formatDate(value) {
    if (!value) return '';
    const date = new Date(value);
    return date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function isAdmin(user) { return user && user.email === ADMIN_EMAIL; }

  function sanitizeEditorHtml(html) {
    const template = document.createElement('template');
    template.innerHTML = html || '';
    template.content.querySelectorAll('script, iframe, object, embed, link, meta, style').forEach(el => el.remove());
    template.content.querySelectorAll('*').forEach(el => {
      [...el.attributes].forEach(attr => {
        const name = attr.name.toLowerCase();
        const value = attr.value || '';
        if (name.startsWith('on')) el.removeAttribute(attr.name);
        if ((name === 'href' || name === 'src') && value.trim().toLowerCase().startsWith('javascript:')) {
          el.removeAttribute(attr.name);
        }
      });
    });
    return template.innerHTML;
  }

  function openLoginModal() {
    $('loginModal').classList.remove('hidden');
    document.body.classList.add('modal-open');
    $('loginId').focus();
  }
  function closeLoginModal() {
    $('loginModal').classList.add('hidden');
    document.body.classList.remove('modal-open');
    setStatus('authStatus', '');
    if ($('loginId')) $('loginId').value = '';
    if ($('password')) $('password').value = '';
  }

  async function refreshSession() {
    const { data } = await client.auth.getSession();
    currentUser = data.session?.user || null;
    renderAuthState();
    await loadStories();
  }

  function renderAuthState() {
    if (isAdmin(currentUser)) {
      $('adminToggle').classList.add('hidden');
      $('editorPanel').classList.remove('hidden');
      closeLoginModal();
      setStatus('authStatus', '');
    } else {
      $('editorPanel').classList.add('hidden');
      $('adminToggle').classList.remove('hidden');
      if (currentUser && !isAdmin(currentUser)) setStatus('authStatus', '관리자 이메일만 글을 작성할 수 있습니다.');
    }
  }

  async function uploadImage(file, folder) {
    if (!file) return '';
    if (!isAdmin(currentUser)) throw new Error('관리자 로그인 후 업로드할 수 있습니다.');
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = `${folder}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const { error } = await client.storage.from(IMAGE_BUCKET).upload(path, file, {
      cacheControl: '3600',
      upsert: false
    });
    if (error) throw error;
    const { data } = client.storage.from(IMAGE_BUCKET).getPublicUrl(path);
    return data.publicUrl;
  }

  function renderThumbnailPreview(url) {
    currentThumbnailUrl = url || '';
    $('thumbnailPreview').innerHTML = url
      ? `<img src="${escapeHtml(url)}" alt="썸네일 미리보기">`
      : '썸네일 미리보기';
  }

  async function loadStories() {
    const { data, error } = await client
      .from('stories')
      .select('id,title,content,content_html,thumbnail_url,created_at,user_id')
      .order('created_at', { ascending: false });

    if (error) {
      $('storyList').innerHTML = `<div class="empty">글을 불러오지 못했습니다.<br>${escapeHtml(error.message)}</div>`;
      return;
    }

    cachedStories = data || [];

    if (!cachedStories.length) {
      $('storyList').innerHTML = '<div class="empty">아직 저장된 글이 없습니다.<br>관리자로 로그인하면 첫 글을 남길 수 있습니다.</div>';
      return;
    }

    $('storyList').innerHTML = cachedStories.map(story => {
      const plain = story.content || stripHtml(story.content_html);
      return `
        <button class="story-card" type="button" data-open="${story.id}">
          <div class="story-thumb">
            ${story.thumbnail_url ? `<img src="${escapeHtml(story.thumbnail_url)}" alt="">` : 'Story'}
          </div>
          <div class="story-card-body">
            <h3>${escapeHtml(story.title)}</h3>
            <div class="story-date">${escapeHtml(formatDate(story.created_at))}</div>
            <div class="story-excerpt">${escapeHtml(plain)}</div>
            ${isAdmin(currentUser) ? `
              <div class="story-actions">
                <span class="secondary" data-edit="${story.id}">수정</span>
                <span class="dark" data-delete="${story.id}">삭제</span>
              </div>
            ` : ''}
          </div>
        </button>
      `;
    }).join('');

    document.querySelectorAll('[data-open]').forEach(btn => {
      btn.addEventListener('click', (event) => {
        const actionTarget = event.target.closest('[data-edit], [data-delete]');
        if (actionTarget) return;
        openDetail(btn.dataset.open);
      });
    });
    document.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        startEdit(btn.dataset.edit);
      });
    });
    document.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        deleteStory(btn.dataset.delete);
      });
    });
  }

  function openDetail(id) {
    const story = cachedStories.find(item => item.id === id);
    if (!story) return;
    $('detailTitle').textContent = story.title || '';
    $('detailDate').textContent = formatDate(story.created_at);
    $('detailContent').innerHTML = sanitizeEditorHtml(story.content_html || `<p>${escapeHtml(story.content || '').replaceAll('\n', '<br>')}</p>`);
    $('detailHero').classList.toggle('has-image', !!story.thumbnail_url);
    $('detailHero').style.backgroundImage = story.thumbnail_url
      ? `linear-gradient(to bottom, rgba(13,10,18,0.15), rgba(13,10,18,0.82)), url("${story.thumbnail_url}")`
      : '';
    $('detailView').classList.add('open');
    $('detailView').setAttribute('aria-hidden', 'false');
    document.body.classList.add('modal-open');
  }

  function closeDetail() {
    $('detailView').classList.remove('open');
    $('detailView').setAttribute('aria-hidden', 'true');
    document.body.classList.remove('modal-open');
  }

  function startEdit(id) {
    const story = cachedStories.find(item => item.id === id);
    if (!story) return;
    editingId = id;
    $('editorTitle').textContent = '글 수정';
    $('storyTitle').value = story.title || '';
    $('richEditor').innerHTML = sanitizeEditorHtml(story.content_html || '');
    renderThumbnailPreview(story.thumbnail_url || '');
    $('cancelEditBtn').classList.remove('hidden');
    $('saveBtn').textContent = '수정 저장';
    window.scrollTo({ top: $('editorPanel').offsetTop - 12, behavior: 'smooth' });
  }

  function resetEditor() {
    editingId = null;
    $('editorTitle').textContent = '새 글 작성';
    $('storyTitle').value = '';
    $('richEditor').innerHTML = '';
    $('thumbnailFile').value = '';
    $('contentImageFile').value = '';
    renderThumbnailPreview('');
    $('cancelEditBtn').classList.add('hidden');
    $('saveBtn').textContent = '저장하기';
    setStatus('saveStatus', '');
  }

  async function saveStory() {
    if (!isAdmin(currentUser)) {
      setStatus('saveStatus', '관리자 로그인 후 저장할 수 있습니다.');
      return;
    }
    const title = $('storyTitle').value.trim();
    const contentHtml = sanitizeEditorHtml($('richEditor').innerHTML.trim());
    const plainContent = stripHtml(contentHtml);
    if (!title || !plainContent) {
      setStatus('saveStatus', '제목과 내용을 모두 입력해주세요.');
      return;
    }

    try {
      setStatus('saveStatus', '저장 중입니다.');
      let thumbnailUrl = currentThumbnailUrl;
      const thumbFile = $('thumbnailFile').files[0];
      if (thumbFile) thumbnailUrl = await uploadImage(thumbFile, 'thumbnails');

      const payload = {
        title,
        content: plainContent,
        content_html: contentHtml,
        thumbnail_url: thumbnailUrl,
        user_id: currentUser.id
      };

      const result = editingId
        ? await client.from('stories').update(payload).eq('id', editingId)
        : await client.from('stories').insert(payload);

      if (result.error) throw result.error;

      resetEditor();
      setStatus('saveStatus', '저장되었습니다.');
      await loadStories();
    } catch (error) {
      setStatus('saveStatus', error.message || '저장 중 오류가 발생했습니다.');
    }
  }

  async function deleteStory(id) {
    if (!isAdmin(currentUser)) return;
    const ok = confirm('이 글을 삭제할까요?');
    if (!ok) return;
    const { error } = await client.from('stories').delete().eq('id', id);
    if (error) {
      setStatus('saveStatus', error.message);
      return;
    }
    await loadStories();
  }

  async function login() {
    const loginId = $('loginId').value.trim();
    const password = $('password').value;

    if (!loginId || !password) {
      setStatus('authStatus', '아이디와 비밀번호를 입력해주세요.');
      return;
    }

    if (loginId !== ADMIN_ID) {
      setStatus('authStatus', '아이디가 맞지 않습니다.');
      return;
    }

    const { data, error } = await client.auth.signInWithPassword({
      email: ADMIN_EMAIL,
      password
    });

    if (error) {
      setStatus('authStatus', '비밀번호가 맞지 않거나 로그인할 수 없습니다.');
      return;
    }

    currentUser = data.user;
    renderAuthState();
    await loadStories();
  }

  async function logout() {
    await client.auth.signOut();
    currentUser = null;
    resetEditor();
    renderAuthState();
    await loadStories();
  }

  document.querySelectorAll('[data-command]').forEach(button => {
    button.addEventListener('click', () => {
      $('richEditor').focus();
      document.execCommand(button.dataset.command, false, null);
    });
  });

  document.querySelectorAll('[data-color]').forEach(button => {
    button.addEventListener('click', () => {
      $('richEditor').focus();
      document.execCommand('foreColor', false, button.dataset.color);
    });
  });

  $('insertImageBtn').addEventListener('click', () => $('contentImageFile').click());

  $('contentImageFile').addEventListener('change', async () => {
    const file = $('contentImageFile').files[0];
    if (!file) return;
    try {
      setStatus('saveStatus', '사진 업로드 중입니다.');
      const url = await uploadImage(file, 'content');
      $('richEditor').focus();
      document.execCommand('insertHTML', false, `<img src="${url}" alt="">`);
      $('contentImageFile').value = '';
      setStatus('saveStatus', '사진이 추가되었습니다.');
    } catch (error) {
      setStatus('saveStatus', error.message || '사진 업로드 중 오류가 발생했습니다.');
    }
  });

  $('thumbnailFile').addEventListener('change', () => {
    const file = $('thumbnailFile').files[0];
    if (!file) {
      renderThumbnailPreview(currentThumbnailUrl);
      return;
    }
    const localUrl = URL.createObjectURL(file);
    $('thumbnailPreview').innerHTML = `<img src="${localUrl}" alt="썸네일 미리보기">`;
  });

  $('adminToggle').addEventListener('click', openLoginModal);
  $('closeLoginBtn').addEventListener('click', closeLoginModal);
  $('loginModal').addEventListener('click', (event) => {
    if (event.target === $('loginModal')) closeLoginModal();
  });
  $('loginBtn').addEventListener('click', login);
  $('password').addEventListener('keydown', event => {
    if (event.key === 'Enter') login();
  });
  $('saveBtn').addEventListener('click', saveStory);
  $('cancelEditBtn').addEventListener('click', resetEditor);
  $('logoutBtn').addEventListener('click', logout);
  $('closeDetailBtn').addEventListener('click', closeDetail);

  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') {
      closeLoginModal();
      closeDetail();
    }
  });

  client.auth.onAuthStateChange((_event, session) => {
    currentUser = session?.user || null;
    renderAuthState();
    loadStories();
  });

  refreshSession();
</script>
</body>
</html>
